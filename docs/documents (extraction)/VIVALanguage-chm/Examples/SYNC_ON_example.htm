<h1>SYNC_ON example</h1>

<p>&nbsp;</p>

<p>DECLARE CHANNEL C1;</p>

<p>DECLARE CHANNEL C2;</p>

<p>&nbsp;</p>

<p>START PRG1;</p>

<p>/;</p>

<p>IL C1;</p>

<p>/;</p>

<p>IH C1;</p>

<p>SYNC_ON;</p>

<p>IL C2;</p>

<p>/ <span class="hcp1">!Synchro signal here</span> &nbsp;</p>

<p>IH C2;</p>

<p>/; <span class="hcp1">!Synchro signal here</span> &nbsp;</p>

<p>/; <span class="hcp1">!Synchro signal here</span> &nbsp;</p>

<p>SYNC_OFF;</p>

<p>/;</p>

<p>ENDTEST;</p>
