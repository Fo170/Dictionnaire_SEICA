<h1>DMASTER example</h1>

<p style="font-weight: bold;"><span style="font-weight: bold;">Example 
 1</span></p>

<p>&nbsp;</p>

<p>DECLARE CHANNEL CH1=1;</p>

<p>DECLARE CHANNEL CH2=2;</p>

<p>START PRG1 STATIC;</p>

<p>/;</p>

<p>~IH CH1;</p>

<p>/;</p>

<p>~IL CH2;</p>

<p>/ DMASTER;</p>

<p>IH CH1;</p>

<p>/;</p>

<p>IL CH2;</p>

<p>/;</p>

<p>ENDTEST;</p>
