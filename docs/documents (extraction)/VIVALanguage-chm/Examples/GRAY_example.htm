<h1>@GRAY example</h1>

<p>&nbsp;</p>

<p style="font-weight: bold;">Example 1</p>

<p>&nbsp;</p>

<p>DECLARE VARIABLE VAR,VAR1;</p>

<p>START PRG1;</p>

<p>/;</p>

<p>@GRAY VAR=1;</p>

<p>@GRAY VAR1=10;</p>

<p>/;</p>

<p>@GRAY VAR=VAR1+15;</p>

<p>@GRAY VAR=VAR1=56-5*2/4&amp;0X0F|0X50;</p>

<p>/;</p>

<p>ENDTEST;</p>
