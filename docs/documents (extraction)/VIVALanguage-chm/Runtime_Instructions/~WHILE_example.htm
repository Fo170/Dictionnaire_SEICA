<h1>~WHILE example</h1>

<p>&nbsp;</p>

<p>DECLARE RUNTIME INTEGER A,B;</p>

<p>START PRG1 STATIC;</p>

<p>/;</p>

<p>~CALC A=100;</p>

<p>~CALC B=1;</p>

<p>/;</p>

<p><span class="hcp1">~WHILE</span> A &gt;= 95 ;</p>

<p>~CALC A=A-1;</p>

<p>~WRITE &quot;A= &nbsp;&quot;A;</p>

<p>~ENDWHILE;</p>

<p>/;</p>

<p>~CALC B=B+1;</p>

<p>/;</p>

<p>~WHILE B&lt;(A*2);</p>

<p>~WRITE &quot;A&lt;B&quot;;</p>

<p><span class="hcp1">~ENDWHILE</span>;</p>

<p>&nbsp;</p>
