<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="40" font-family="Arial" font-size="24" text-anchor="middle" font-weight="bold" fill="#1e293b">Analyse FNODE (Harmonique &amp; FFT)</text>
  
  <!-- Signal Source -->
  <rect x="50" y="100" width="120" height="60" rx="5" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
  <text x="110" y="135" font-family="Arial" font-size="14" text-anchor="middle">Source Sinus</text>
  
  <!-- DUT Network -->
  <rect x="250" y="80" width="200" height="100" rx="10" fill="#e2e8f0" stroke="#475569" stroke-width="2"/>
  <text x="350" y="135" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">Réseau UUT (Dipôle)</text>
  
  <!-- FFT Analysis -->
  <rect x="550" y="100" width="150" height="60" rx="5" fill="#fff" stroke="#ef4444" stroke-width="2"/>
  <text x="625" y="135" font-family="Arial" font-size="14" text-anchor="middle">Analyse FFT</text>
  
  <!-- Connections -->
  <line x1="170" y1="130" x2="250" y2="130" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="130" x2="550" y2="130" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Results -->
  <g transform="translate(100, 220)">
    <rect width="600" height="140" rx="10" fill="#fff" stroke="#94a3b8"/>
    <text x="300" y="30" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">Résultats de l'Analyse</text>
    <text x="50" y="70" font-family="Arial" font-size="14">Magnitude du Courant (I)</text>
    <text x="50" y="100" font-family="Arial" font-size="14">Déphasage (Phase ϑ)</text>
    <text x="350" y="70" font-family="Arial" font-size="14">Composante Réelle (Rp, Rs)</text>
    <text x="350" y="100" font-family="Arial" font-size="14">Composante Réactive (Cp, Lp)</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569" />
    </marker>
  </defs>
</svg>
