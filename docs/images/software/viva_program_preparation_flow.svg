<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="40" font-family="Arial" font-size="24" text-anchor="middle" font-weight="bold" fill="#1e293b">Flux de Préparation du Programme VIVA</text>
  
  <!-- Step 1: PREPARE -->
  <rect x="50" y="80" width="200" height="280" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="150" y="110" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold" fill="#1e40af">1. PREPARE</text>
  <g transform="translate(60, 140)">
    <rect width="180" height="40" rx="5" fill="#fff"/>
    <text x="90" y="25" font-family="Arial" font-size="14" text-anchor="middle">IMPORT DATA (CAD/BOM)</text>
  </g>
  <g transform="translate(60, 190)">
    <rect width="180" height="40" rx="5" fill="#fff"/>
    <text x="90" y="25" font-family="Arial" font-size="14" text-anchor="middle">EDIT DATA (UUT)</text>
  </g>
  <g transform="translate(60, 240)">
    <rect width="180" height="40" rx="5" fill="#fff"/>
    <text x="90" y="25" font-family="Arial" font-size="14" text-anchor="middle">CREATE PROGRAM</text>
  </g>
  <g transform="translate(60, 290)">
    <rect width="180" height="40" rx="5" fill="#fff"/>
    <text x="90" y="25" font-family="Arial" font-size="14" text-anchor="middle">MULTIPLY BOARD</text>
  </g>

  <!-- Arrow -->
  <path d="M 250 220 L 300 220" stroke="#94a3b8" stroke-width="4" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Step 2: VERIFY -->
  <rect x="300" y="80" width="200" height="280" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="110" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold" fill="#92400e">2. VERIFY</text>
  <g transform="translate(310, 140)">
    <rect width="180" height="40" rx="5" fill="#fff"/>
    <text x="90" y="25" font-family="Arial" font-size="14" text-anchor="middle">PROGRAM SETUP</text>
  </g>
  <g transform="translate(310, 190)">
    <rect width="180" height="40" rx="5" fill="#fff"/>
    <text x="90" y="25" font-family="Arial" font-size="14" text-anchor="middle">OPTICAL ALIGNMENT</text>
  </g>
  <g transform="translate(310, 240)">
    <rect width="180" height="40" rx="5" fill="#fff"/>
    <text x="90" y="25" font-family="Arial" font-size="14" text-anchor="middle">VERIFY &amp; DEBUG</text>
  </g>

  <!-- Arrow -->
  <path d="M 500 220 L 550 220" stroke="#94a3b8" stroke-width="4" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Step 3: TEST -->
  <rect x="550" y="80" width="200" height="280" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="650" y="110" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold" fill="#166534">3. TEST</text>
  <g transform="translate(560, 140)">
    <rect width="180" height="40" rx="5" fill="#fff"/>
    <text x="90" y="25" font-family="Arial" font-size="14" text-anchor="middle">RUN PROGRAM</text>
  </g>
  <g transform="translate(560, 190)">
    <rect width="180" height="40" rx="5" fill="#fff"/>
    <text x="90" y="25" font-family="Arial" font-size="14" text-anchor="middle">PRODUCTION MODE</text>
  </g>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>
</svg>
