<svg width="800" height="300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f8f9fa"/>
  
  <!-- Time axis -->
  <line x1="50" y1="250" x2="750" y2="250" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="760" y="255" font-family="Arial" font-size="12">Temps</text>
  
  <!-- Pattern 1 -->
  <rect x="50" y="80" width="100" height="150" fill="#dee2e6" stroke="#adb5bd"/>
  <text x="100" y="160" font-family="Arial" font-size="12" text-anchor="middle">DEAD</text>
  
  <rect x="150" y="80" width="250" height="150" fill="#ebfbee" stroke="#40c057" stroke-width="2"/>
  <text x="275" y="100" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">PHASE OPÉRATIVE (PERIOD)</text>
  
  <!-- Overlay -->
  <rect x="150" y="110" width="60" height="120" fill="#fff9db" stroke="#f08c00" stroke-dasharray="5,5"/>
  <text x="180" y="140" font-family="Arial" font-size="10" text-anchor="middle">OVERLAY</text>
  
  <!-- Events -->
  <line x1="250" y1="80" x2="250" y2="230" stroke="#fa5252" stroke-width="2" stroke-dasharray="2,2"/>
  <text x="250" y="70" font-family="Arial" font-size="11" text-anchor="middle" fill="#fa5252">ASSERT</text>
  
  <line x1="350" y1="80" x2="350" y2="230" stroke="#228be6" stroke-width="2" stroke-dasharray="2,2"/>
  <text x="350" y="70" font-family="Arial" font-size="11" text-anchor="middle" fill="#228be6">STROBE</text>
  
  <!-- Pattern 2 -->
  <rect x="400" y="80" width="80" height="150" fill="#dee2e6" stroke="#adb5bd"/>
  <text x="440" y="160" font-family="Arial" font-size="12" text-anchor="middle">DEAD</text>
  
  <rect x="480" y="80" width="200" height="150" fill="#ebfbee" stroke="#40c057" stroke-width="2"/>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>
</svg>
