<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#f8fafc"/>
  <text x="400" y="40" font-family="Arial" font-size="24" text-anchor="middle" font-weight="bold" fill="#1e293b">Modes de Mesure VIVA (2, 4, 6 fils)</text>
  
  <!-- 2-Wire -->
  <g transform="translate(50, 80)">
    <rect width="220" height="120" rx="10" fill="#fff" stroke="#94a3b8"/>
    <text x="110" y="25" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">2-WIRE</text>
    <line x1="40" y1="60" x2="80" y2="60" stroke="#ef4444" stroke-width="2"/>
    <line x1="140" y1="60" x2="180" y2="60" stroke="#ef4444" stroke-width="2"/>
    <rect x="80" y="45" width="60" height="30" fill="#e2e8f0" stroke="#475569"/>
    <text x="110" y="65" font-family="Arial" font-size="12" text-anchor="middle">DUT</text>
    <text x="110" y="100" font-family="Arial" font-size="11" text-anchor="middle" fill="#64748b">Simple, erreur de câble incluse</text>
  </g>

  <!-- 4-Wire (Kelvin) -->
  <g transform="translate(300, 80)">
    <rect width="220" height="120" rx="10" fill="#fff" stroke="#94a3b8"/>
    <text x="110" y="25" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">4-WIRE (Kelvin)</text>
    <line x1="40" y1="50" x2="80" y2="50" stroke="#ef4444" stroke-width="2"/>
    <line x1="40" y1="70" x2="80" y2="70" stroke="#3b82f6" stroke-width="2"/>
    <line x1="140" y1="50" x2="180" y2="50" stroke="#ef4444" stroke-width="2"/>
    <line x1="140" y1="70" x2="180" y2="70" stroke="#3b82f6" stroke-width="2"/>
    <rect x="80" y="45" width="60" height="30" fill="#e2e8f0" stroke="#475569"/>
    <text x="110" y="65" font-family="Arial" font-size="12" text-anchor="middle">DUT</text>
    <text x="110" y="100" font-family="Arial" font-size="11" text-anchor="middle" fill="#64748b">Précis, compense les câbles</text>
  </g>

  <!-- 6-Wire -->
  <g transform="translate(550, 80)">
    <rect width="220" height="120" rx="10" fill="#fff" stroke="#94a3b8"/>
    <text x="110" y="25" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">6-WIRE</text>
    <line x1="40" y1="40" x2="80" y2="40" stroke="#ef4444" stroke-width="2"/>
    <line x1="40" y1="60" x2="80" y2="60" stroke="#3b82f6" stroke-width="2"/>
    <line x1="40" y1="80" x2="80" y2="80" stroke="#22c55e" stroke-width="2"/>
    <line x1="140" y1="40" x2="180" y2="40" stroke="#ef4444" stroke-width="2"/>
    <line x1="140" y1="60" x2="180" y2="60" stroke="#3b82f6" stroke-width="2"/>
    <line x1="140" y1="80" x2="180" y2="80" stroke="#22c55e" stroke-width="2"/>
    <rect x="80" y="45" width="60" height="30" fill="#e2e8f0" stroke="#475569"/>
    <text x="110" y="65" font-family="Arial" font-size="12" text-anchor="middle">DUT</text>
    <text x="110" y="105" font-family="Arial" font-size="11" text-anchor="middle" fill="#64748b">Kelvin + Guarding</text>
  </g>

  <!-- Guarding Principle -->
  <g transform="translate(200, 230)">
    <rect width="400" height="140" rx="10" fill="#f1f5f9" stroke="#475569" stroke-dasharray="5,5"/>
    <text x="200" y="25" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold">Principe du Guarding</text>
    <circle cx="100" cy="80" r="20" fill="#fff" stroke="#ef4444" stroke-width="2"/>
    <text x="100" y="85" font-family="Arial" font-size="12" text-anchor="middle">Gen</text>
    <circle cx="300" cy="80" r="20" fill="#fff" stroke="#3b82f6" stroke-width="2"/>
    <text x="300" y="85" font-family="Arial" font-size="12" text-anchor="middle">Meter</text>
    <path d="M 120 80 L 280 80" stroke="#475569" stroke-width="2" fill="none"/>
    <circle cx="200" cy="80" r="5" fill="#475569"/>
    <line x1="200" y1="80" x2="200" y2="110" stroke="#22c55e" stroke-width="2"/>
    <text x="200" y="125" font-family="Arial" font-size="12" text-anchor="middle" fill="#166534">Point de Garde (Neutralise les fuites)</text>
  </g>
</svg>
