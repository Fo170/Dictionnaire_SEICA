<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f8f9fa"/>
  <text x="400" y="40" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle" fill="#333">Environnements de Travail VIVA</text>
  
  <!-- Wizard -->
  <rect x="50" y="80" width="220" height="80" rx="10" fill="#e7f5ff" stroke="#228be6" stroke-width="2"/>
  <text x="160" y="115" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Wizard (CTRL+W)</text>
  <text x="160" y="140" font-family="Arial" font-size="12" text-anchor="middle">Création guidée de programmes</text>
  
  <!-- Graphic -->
  <rect x="290" y="80" width="220" height="80" rx="10" fill="#f3f0ff" stroke="#7950f2" stroke-width="2"/>
  <text x="400" y="115" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Graphic (CTRL+G)</text>
  <text x="400" y="140" font-family="Arial" font-size="12" text-anchor="middle">Gestion du layout et des points</text>
  
  <!-- Programming -->
  <rect x="530" y="80" width="220" height="80" rx="10" fill="#fff9db" stroke="#f08c00" stroke-width="2"/>
  <text x="640" y="115" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Programming (CTRL+P)</text>
  <text x="640" y="140" font-family="Arial" font-size="12" text-anchor="middle">Développement de macros/outils</text>
  
  <!-- Debug -->
  <rect x="50" y="200" width="220" height="80" rx="10" fill="#fff5f5" stroke="#fa5252" stroke-width="2"/>
  <text x="160" y="235" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Debug (CTRL+D)</text>
  <text x="160" y="260" font-family="Arial" font-size="12" text-anchor="middle">Mise au point et vérification</text>
  
  <!-- Camera -->
  <rect x="290" y="200" width="220" height="80" rx="10" fill="#e3fafc" stroke="#1098ad" stroke-width="2"/>
  <text x="400" y="235" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Camera (CTRL+I)</text>
  <text x="400" y="260" font-family="Arial" font-size="12" text-anchor="middle">Apprentissage optique (Flying Probe)</text>
  
  <!-- Functional -->
  <rect x="530" y="200" width="220" height="80" rx="10" fill="#ebfbee" stroke="#40c057" stroke-width="2"/>
  <text x="640" y="235" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Functional (CTRL+F)</text>
  <text x="640" y="260" font-family="Arial" font-size="12" text-anchor="middle">Édition de patterns numériques</text>
</svg>
