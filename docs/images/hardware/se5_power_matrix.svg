<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f8f9fa"/>
  <text x="300" y="30" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#333">Matrice de Puissance SE5 (Power Matrix)</text>
  
  <!-- PW Units -->
  <rect x="50" y="80" width="100" height="60" rx="5" fill="#fff9db" stroke="#f08c00" stroke-width="2"/>
  <text x="100" y="115" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">PW2 / PW3</text>
  
  <!-- Matrix -->
  <line x1="150" y1="110" x2="250" y2="110" stroke="#333" stroke-width="2"/>
  <rect x="250" y="80" width="200" height="240" rx="10" fill="#e7f5ff" stroke="#228be6" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="350" y="205" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#228be6">Matrice 2x8</text>
  
  <!-- Probes -->
  <g transform="translate(450, 100)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#333" stroke-width="2"/>
    <circle cx="60" cy="0" r="5" fill="#fa5252"/>
    <text x="75" y="5" font-family="Arial" font-size="12">Sonde 1</text>
    
    <line x1="0" y1="40" x2="50" y2="40" stroke="#333" stroke-width="2"/>
    <circle cx="60" cy="40" r="5" fill="#fa5252"/>
    <text x="75" y="45" font-family="Arial" font-size="12">Sonde 2</text>
    
    <text x="30" y="100" font-family="Arial" font-size="20" text-anchor="middle">...</text>
    
    <line x1="0" y1="160" x2="50" y2="160" stroke="#333" stroke-width="2"/>
    <circle cx="60" cy="160" r="5" fill="#fa5252"/>
    <text x="75" y="165" font-family="Arial" font-size="12">Sonde 8</text>
  </g>
  
  <!-- Specs -->
  <rect x="50" y="340" width="500" height="40" rx="5" fill="#e9ecef" stroke="#adb5bd"/>
  <text x="300" y="365" font-family="Arial" font-size="14" text-anchor="middle" fill="#495057">Capacité : 2A max via 2 ou 4 sondes</text>
</svg>
