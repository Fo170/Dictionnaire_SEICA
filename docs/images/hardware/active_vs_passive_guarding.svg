<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f8f9fa"/>
  <text x="20" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#333">Concepts de Guarding (ACL)</text>
  
  <!-- Active Guarding -->
  <g transform="translate(50, 80)">
    <rect width="220" height="250" rx="5" fill="#fff" stroke="#dee2e6" stroke-dasharray="5,5"/>
    <text x="110" y="30" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Guarding ACTIF</text>
    <circle cx="110" cy="100" r="20" fill="none" stroke="#228be6" stroke-width="2"/>
    <text x="110" y="105" font-family="Arial" font-size="12" text-anchor="middle">I Gen</text>
    <rect x="80" y="150" width="60" height="30" fill="#fab005"/>
    <text x="110" y="170" font-family="Arial" font-size="12" text-anchor="middle">DUT (Zx)</text>
    <text x="110" y="220" font-family="Arial" font-size="11" text-anchor="middle" fill="#666">Potentiel Guard = Potentiel Gen</text>
  </g>
  
  <!-- Passive Guarding -->
  <g transform="translate(330, 80)">
    <rect width="220" height="250" rx="5" fill="#fff" stroke="#dee2e6" stroke-dasharray="5,5"/>
    <text x="110" y="30" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Guarding PASSIF</text>
    <circle cx="110" cy="100" r="20" fill="none" stroke="#fa5252" stroke-width="2"/>
    <text x="110" y="105" font-family="Arial" font-size="12" text-anchor="middle">V Gen</text>
    <rect x="80" y="150" width="60" height="30" fill="#fab005"/>
    <text x="110" y="170" font-family="Arial" font-size="12" text-anchor="middle">DUT (Zx)</text>
    <text x="110" y="220" font-family="Arial" font-size="11" text-anchor="middle" fill="#666">Guard à la Masse Virtuelle</text>
  </g>
</svg>
