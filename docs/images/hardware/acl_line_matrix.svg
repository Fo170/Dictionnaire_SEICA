<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f8f9fa"/>
  <text x="20" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#333">Matrice de Commutation ACL (Lignes L1-L8)</text>
  
  <!-- System Bus Lines -->
  <g stroke="#adb5bd" stroke-width="1">
    <line x1="100" y1="80" x2="500" y2="80"/><text x="80" y="85" font-family="Arial" font-size="12">L1</text>
    <line x1="100" y1="110" x2="500" y2="110"/><text x="80" y="115" font-family="Arial" font-size="12">L2</text>
    <line x1="100" y1="140" x2="500" y2="140"/><text x="80" y="145" font-family="Arial" font-size="12">L3</text>
    <line x1="100" y1="170" x2="500" y2="170"/><text x="80" y="175" font-family="Arial" font-size="12">L4</text>
    <line x1="100" y1="200" x2="500" y2="200"/><text x="80" y="205" font-family="Arial" font-size="12">L5</text>
    <line x1="100" y1="230" x2="500" y2="230"/><text x="80" y="235" font-family="Arial" font-size="12">L6</text>
    <line x1="100" y1="260" x2="500" y2="260"/><text x="80" y="265" font-family="Arial" font-size="12">L7</text>
    <line x1="100" y1="290" x2="500" y2="290"/><text x="80" y="295" font-family="Arial" font-size="12">L8</text>
  </g>
  
  <!-- Relay Points (Examples) -->
  <circle cx="150" cy="80" r="4" fill="#fa5252" stroke="#333"/>
  <circle cx="150" cy="200" r="4" fill="#fa5252" stroke="#333"/>
  <text x="130" y="330" font-family="Arial" font-size="10" fill="#fa5252">Mode 4L (L1=L5)</text>
  
  <!-- Connection to System Bus -->
  <rect x="400" y="70" width="80" height="230" fill="none" stroke="#228be6" stroke-dasharray="5,5"/>
  <text x="440" y="320" font-family="Arial" font-size="12" text-anchor="middle" fill="#228be6">Vers Bus Système</text>
  
  <!-- Legend -->
  <circle cx="100" cy="360" r="4" fill="#fa5252" stroke="#333"/>
  <text x="115" y="365" font-family="Arial" font-size="12">Relais de couplage</text>
</svg>
